<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #fafaf9;
        color: #292524;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }
      input,
      select {
        font-family: inherit;
      }

      /* ── Layout deux colonnes ── */
      .shell {
        display: flex;
        min-height: 100vh;
      }
      .panel {
        flex: 1;
        padding: 60px 36px 80px;
        overflow-y: auto;
      }
      .panel-left {
        border-right: 1px solid #e7e5e4;
      }
      .inner {
        max-width: 520px;
        margin: 0 auto;
      }

      @media (max-width: 860px) {
        .shell {
          flex-direction: column;
        }
        .panel-left {
          border-right: none;
          border-bottom: 1px solid #e7e5e4;
        }
      }

      /* ── Typo commune ── */
      h1 {
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .accent {
        color: #f97316;
      }
      .subtitle {
        font-family: "Cascadia Code", "SF Mono", "Consolas", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #a8a29e;
        margin-top: 4px;
        margin-bottom: 40px;
      }
      h2 {
        font-family: "Cascadia Code", "SF Mono", "Consolas", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      /* ══════════════════════════════════
       PANEL GAUCHE — Tâches
       ══════════════════════════════════ */

      /* Barre d'ajout */
      .add-bar {
        display: flex;
        gap: 6px;
        margin-bottom: 20px;
      }
      .add-bar input[type="text"] {
        flex: 1;
        padding: 10px 14px;
        font-size: 0.875rem;
        border: 1px solid #d6d3d1;
        border-radius: 8px;
        background: #fff;
        outline: none;
        transition: border-color 0.15s;
      }
      .add-bar input[type="text"]:focus {
        border-color: #f97316;
      }
      .add-bar select {
        padding: 10px 10px;
        font-size: 0.75rem;
        border: 1px solid #d6d3d1;
        border-radius: 8px;
        background: #fff;
        color: #78716c;
        outline: none;
      }
      .add-bar button {
        padding: 10px 18px;
        font-size: 0.8rem;
        font-weight: 600;
        background: #292524;
        color: #fafaf9;
        border-radius: 8px;
        transition: background 0.15s;
      }
      .add-bar button:hover {
        background: #f97316;
      }

      /* Filtres */
      .filters {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .filters button {
        font-family: "Cascadia Code", "SF Mono", "Consolas", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid #e7e5e4;
        color: #a8a29e;
        transition: all 0.15s;
      }
      .filters button:hover {
        border-color: #292524;
        color: #292524;
      }
      .filters button.active {
        background: #292524;
        color: #fafaf9;
        border-color: #292524;
      }

      /* Liste de tâches */
      .tasks {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .task {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid;
        transition:
          background 0.15s,
          border-color 0.15s,
          opacity 0.15s;
      }
      .task.done {
        opacity: 0.5;
      }
      .task.done .task-text {
        text-decoration: line-through;
        color: #a8a29e;
      }

      /* Checkbox custom */
      .check {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        cursor: pointer;
      }
      .check:hover {
        transform: scale(1.1);
      }
      .task.done .check {
        background: currentColor;
      }
      .task.done .check::after {
        content: "✓";
        color: #fff;
        font-size: 0.65rem;
        font-weight: 700;
      }

      .task-text {
        flex: 1;
        font-size: 0.875rem;
      }
      .task-tag {
        font-family: "Cascadia Code", "SF Mono", "Consolas", monospace;
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 5px;
        flex-shrink: 0;
      }
      .task-del {
        font-size: 0.8rem;
        color: #d6d3d1;
        transition: color 0.15s;
        padding: 2px 4px;
        flex-shrink: 0;
      }
      .task-del:hover {
        color: #ef4444;
      }

      /* Couleurs tâches par catégorie */
      .task-urgent {
        border-color: #fecdd3;
        background: rgba(255, 228, 230, 0.3);
        color: #e11d48;
      }
      .task-urgent .task-tag {
        background: rgba(255, 228, 230, 0.6);
        color: #be123c;
      }
      .task-normal {
        border-color: #dbeafe;
        background: rgba(219, 234, 254, 0.3);
        color: #2563eb;
      }
      .task-normal .task-tag {
        background: rgba(219, 234, 254, 0.6);
        color: #1d4ed8;
      }
      .task-later {
        border-color: #e7e5e4;
        background: rgba(231, 229, 228, 0.3);
        color: #78716c;
      }
      .task-later .task-tag {
        background: rgba(231, 229, 228, 0.6);
        color: #57534e;
      }

      .empty-msg {
        text-align: center;
        padding: 40px 0;
        color: #a8a29e;
        font-style: italic;
        font-size: 0.9rem;
      }

      /* ══════════════════════════════════
       PANEL DROIT — Liens
       ══════════════════════════════════ */
      section {
        margin-bottom: 32px;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .link:hover .arrow {
        opacity: 1;
      }
      .link-name {
        font-size: 0.875rem;
        font-weight: 600;
        transition: color 0.15s;
      }
      .link-desc {
        font-size: 0.875rem;
        color: #a8a29e;
        margin-left: 8px;
      }
      .arrow {
        opacity: 0;
        font-size: 0.85rem;
        transition: opacity 0.15s;
        flex-shrink: 0;
      }

      .t-green h2 {
        color: #059669;
      }
      .t-green .link {
        border-color: #d1fae5;
        background: rgba(209, 250, 229, 0.3);
      }
      .t-green .link:hover {
        background: rgba(167, 243, 208, 0.35);
      }
      .t-green .link:hover .link-name {
        color: #047857;
      }
      .t-green .arrow {
        color: #6ee7b7;
      }

      .t-violet h2 {
        color: #7c3aed;
      }
      .t-violet .link {
        border-color: #ede9fe;
        background: rgba(237, 233, 254, 0.3);
      }
      .t-violet .link:hover {
        background: rgba(221, 214, 254, 0.4);
      }
      .t-violet .link:hover .link-name {
        color: #6d28d9;
      }
      .t-violet .arrow {
        color: #c4b5fd;
      }

      .t-amber h2 {
        color: #d97706;
      }
      .t-amber .link {
        border-color: #fef3c7;
        background: rgba(254, 243, 199, 0.3);
      }
      .t-amber .link:hover {
        background: rgba(253, 230, 138, 0.35);
      }
      .t-amber .link:hover .link-name {
        color: #b45309;
      }
      .t-amber .arrow {
        color: #fcd34d;
      }

      .t-sky h2 {
        color: #0284c7;
      }
      .t-sky .link {
        border-color: #e0f2fe;
        background: rgba(224, 242, 254, 0.3);
      }
      .t-sky .link:hover {
        background: rgba(186, 230, 253, 0.35);
      }
      .t-sky .link:hover .link-name {
        color: #0369a1;
      }
      .t-sky .arrow {
        color: #7dd3fc;
      }

      .t-rose h2 {
        color: #e11d48;
      }
      .t-rose .link {
        border-color: #ffe4e6;
        background: rgba(255, 228, 230, 0.3);
      }
      .t-rose .link:hover {
        background: rgba(254, 205, 211, 0.35);
      }
      .t-rose .link:hover .link-name {
        color: #be123c;
      }
      .t-rose .arrow {
        color: #fda4af;
      }

      .t-teal h2 {
        color: #0d9488;
      }
      .t-teal .link {
        border-color: #ccfbf1;
        background: rgba(204, 251, 241, 0.3);
      }
      .t-teal .link:hover {
        background: rgba(153, 246, 228, 0.3);
      }
      .t-teal .link:hover .link-name {
        color: #0f766e;
      }
      .t-teal .arrow {
        color: #5eead4;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <!-- ╔══════════════════════════════════════╗
       ║  GAUCHE — Tâches (localStorage)     ║
       ╚══════════════════════════════════════╝ -->
      <div class="panel panel-left">
        <div class="inner">
          <h1>mesTaches<span class="accent">.</span></h1>
          <p class="subtitle">tout ce que je dois faire</p>

          <!-- Ajout -->
          <div class="add-bar">
            <input
              type="text"
              id="taskInput"
              placeholder="Nouvelle tâche…"
              onkeydown="if (event.key === 'Enter') addTask();"
            />
            <select id="taskPriority">
              <option value="normal">Normal</option>
              <option value="urgent">Urgent</option>
              <option value="later">Plus tard</option>
            </select>
            <button onclick="addTask()">+</button>
          </div>

          <!-- Filtres -->
          <div class="filters">
            <button class="active" onclick="setFilter('all', this)">
              Tout
            </button>
            <button onclick="setFilter('todo', this)">À faire</button>
            <button onclick="setFilter('done', this)">Fait</button>
            <button onclick="setFilter('urgent', this)">Urgent</button>
            <button onclick="setFilter('normal', this)">Normal</button>
            <button onclick="setFilter('later', this)">Plus tard</button>
          </div>

          <!-- Liste -->
          <div class="tasks" id="taskList"></div>
        </div>
      </div>

      <!-- ╔══════════════════════════════════════╗
       ║  DROITE — Liens (statique)          ║
       ╚══════════════════════════════════════╝ -->
      <div class="panel">
        <div class="inner">
          <h1>mesLiens<span class="accent">.</span></h1>
          <p class="subtitle">tout ce que je ne veux pas perdre</p>

          <div id="linksContainer"></div>
        </div>
      </div>
    </div>

    <!-- ══ JS — tâches + liens ══ -->
    <script>
      // ── Données des liens ──────────────────────────────────────────────
      const mesLiens = [
        {
          theme: "t-green",
          titre: "Dev & Code",
          liens: [
            {
              nom: "Tailwind CSS",
              desc: "Documentation officielle",
              url: "https://tailwindcss.com/docs",
            },
            {
              nom: "MDN Web Docs",
              desc: "Référence HTML, CSS, JS",
              url: "https://developer.mozilla.org/fr/",
            },
            {
              nom: "GitHub",
              desc: "Repos, issues, PRs",
              url: "https://github.com",
            },
          ],
        },
        {
          theme: "t-violet",
          titre: "Design & Inspi",
          liens: [
            {
              nom: "Unsplash",
              desc: "Photos libres de droits",
              url: "https://unsplash.com",
            },
            {
              nom: "Dribbble",
              desc: "Inspiration UI/UX",
              url: "https://dribbble.com",
            },
          ],
        },
        {
          theme: "t-amber",
          titre: "Outils",
          liens: [
            {
              nom: "Excalidraw",
              desc: "Whiteboard hand-drawn",
              url: "https://excalidraw.com",
            },
            {
              nom: "Notion",
              desc: "Notes et docs tout-en-un",
              url: "https://notion.so",
            },
          ],
        },
        {
          theme: "t-sky",
          titre: "Veille",
          liens: [
            {
              nom: "Hacker News",
              desc: "Actu tech et startups",
              url: "https://news.ycombinator.com",
            },
          ],
        },
      ];

      function renderLiens() {
        const container = document.getElementById("linksContainer");
        container.innerHTML = mesLiens
          .map(
            (cat) => `
          <section class="${cat.theme}">
            <h2>${cat.titre}</h2>
            <div class="links">
              ${cat.liens
                .map(
                  (l) => `
              <a href="${l.url}" target="_blank" class="link">
                <div>
                  <span class="link-name">${l.nom}</span
                  ><span class="link-desc">— ${l.desc}</span>
                </div>
                <span class="arrow">↗</span>
              </a>`,
                )
                .join("")}
            </div>
          </section>`,
          )
          .join("");
      }

      renderLiens();
    </script>

    <!-- ══ JS — uniquement pour les tâches ══ -->
    <script>
      const KEY = "mes_taches";
      let filter = "all";

      function load() {
        try {
          return JSON.parse(localStorage.getItem(KEY)) || [];
        } catch {
          return [];
        }
      }
      function save(tasks) {
        localStorage.setItem(KEY, JSON.stringify(tasks));
      }

      function addTask() {
        const input = document.getElementById("taskInput");
        const text = input.value.trim();
        if (!text) return;
        const priority = document.getElementById("taskPriority").value;
        const tasks = load();
        tasks.unshift({ id: Date.now(), text, priority, done: false });
        save(tasks);
        input.value = "";
        render();
      }

      function toggle(id) {
        const tasks = load();
        const t = tasks.find((t) => t.id === id);
        if (t) t.done = !t.done;
        save(tasks);
        render();
      }

      function remove(id) {
        save(load().filter((t) => t.id !== id));
        render();
      }

      function setFilter(f, btn) {
        filter = f;
        document
          .querySelectorAll(".filters button")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      }

      function render() {
        const tasks = load();
        const list = document.getElementById("taskList");

        const filtered = tasks.filter((t) => {
          if (filter === "todo") return !t.done;
          if (filter === "done") return t.done;
          if (filter === "urgent" || filter === "normal" || filter === "later")
            return t.priority === filter;
          return true;
        });

        if (filtered.length === 0) {
          list.innerHTML = '<p class="empty-msg">Rien ici pour l\'instant.</p>';
          return;
        }

        const labels = {
          urgent: "Urgent",
          normal: "Normal",
          later: "Plus tard",
        };

        list.innerHTML = filtered
          .map(
            (t) => `
      <div class="task task-${t.priority} ${t.done ? "done" : ""}">
        <div class="check" onclick="toggle(${t.id})"></div>
        <span class="task-text">${esc(t.text)}</span>
        <span class="task-tag">${labels[t.priority]}</span>
        <button class="task-del" onclick="remove(${t.id})" title="Supprimer">✕</button>
      </div>
    `,
          )
          .join("");
      }

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      render();
    </script>
  </body>
</html>
